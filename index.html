<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madeline Hou</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="static/initials.png" />
  </head>
  <body>
    <!-- Hero: 3D Egg Tart -->
    <section class="hero">
      <canvas id="egg-tart-canvas"></canvas>
      <div class="hero-hint">drag to spin</div>
      <div class="scroll-indicator">
        <span>scroll</span>
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- Info -->
    <section class="info">
      <div class="container">
        <h1 class="info-name">Madeline Hou</h1>

        <div class="info-links">
          <a href="https://www.linkedin.com/in/madeline-hou/" class="info-link" target="_blank" rel="noopener">LinkedIn</a>
          <span class="info-separator">&middot;</span>
          <a href="https://github.com/madelinehou" class="info-link" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </section>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script type="module" src="egg-tart.js"></script>
    <script src="script.js"></script>
  </body>
</html>
